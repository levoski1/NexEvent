name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TypeScript packages + apps ─────────────────────────────────────────────
  ts-build-test:
    name: TypeScript — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build packages
        run: npm run build --workspace=@nexevent/shared-types --workspace=@nexevent/shared-utils --workspace=@nexevent/config

      - name: Build backend
        run: npm run build --workspace=@nexevent/backend

      - name: Build worker
        run: npm run build --workspace=@nexevent/worker

      - name: Build frontend
        run: npm run build --workspace=@nexevent/frontend
        env:
          VITE_API_BASE_URL: /api/v1

      - name: Run backend tests
        run: npm run test --workspace=@nexevent/backend
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_min_32_chars_for_ci_ok
          ADMIN_API_KEY: test_admin_key_16ch
          MONGODB_URI: mongodb://localhost:27017/nexevent_test
          REDIS_HOST: localhost
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

  # ─── Soroban contracts ───────────────────────────────────────────────────────
  contracts:
    name: Soroban Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build contracts
        run: cargo build --release --target wasm32-unknown-unknown
        working-directory: contracts

      - name: Test contracts
        run: cargo test
        working-directory: contracts

  # ─── Docker build check ──────────────────────────────────────────────────────
  docker:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [ts-build-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy (main branch only) ───────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ts-build-test, contracts, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }},ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.sha }},ghcr.io/${{ github.repository }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }},ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
