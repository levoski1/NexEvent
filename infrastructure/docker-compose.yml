version: '3.9'

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nexevent
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/nexevent
      REDIS_HOST: redis
    ports:
      - '4000:4000'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/nexevent
      REDIS_HOST: redis
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
